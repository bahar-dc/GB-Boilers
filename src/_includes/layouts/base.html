<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->

<!doctype html>
<html lang="en">
  <head>
    <!-- Standard meta tags -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ description }}" />
    <meta name="keywords" content="" />
    <meta
      name="google-site-verification"
      content="0xWYl9P_I3pnMxlLdfvpUD26Iyvrl46BImiYx5Lh6EA"
    />
    <!-- <link rel="canonical" href="{{ client.domain }}{{ page.url }}"> -->

    <!--Social Media Display-->
    <meta property="og:title" content="{{ title }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ client.domain }}{{ page.url }}" />
    <meta property="og:image" content="/assets/images/image-11.webp " />
    <meta
      property="og:image:secure_url"
      content="/assets/images/image-11.webp"
    />

    <!--Favicons-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicons/favicon-32x32.png?v1"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/favicons/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Cookies Consent -->

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <link
      rel="stylesheet"
      id="silktide-consent-manager-css"
      href="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.0/silktide-consent-manager.css"
      integrity="sha384-IO1E/jCrQXyH5rwcI0SXP7OXw47JFqQNDQcKhbFvqnL2IunBxxwE2Ne5XyAmCqKs"
      crossorigin="anonymous"
    />

    <style>
      :root {
        /* Change these per website */
        --cookie-primary: #375e9d;
        --cookie-primary-hover: #2b4979;
        --cookie-background: #ffffff;
        --cookie-text: #4b494b;
        --cookie-light: #f4f0df;
        --cookie-border: #e5e5e5;
        --cookie-white: #ffffff;

        /* Silktide variables */
        --stcm-color-primary: var(--cookie-primary);
        --stcm-color-background: var(--cookie-background);
        --stcm-color-text: var(--cookie-text);
      }

      /* Main buttons */
      .stcm-button-primary,
      .stcm-button--primary,
      button[data-stcm-accept-all],
      button[data-stcm-save] {
        background-color: var(--cookie-primary) !important;
        border-color: var(--cookie-primary) !important;
        color: var(--cookie-white) !important;
        transition: all 0.3s ease !important;
      }

      .stcm-button-primary:hover,
      .stcm-button--primary:hover,
      button[data-stcm-accept-all]:hover,
      button[data-stcm-save]:hover {
        background-color: var(--cookie-primary-hover) !important;
        border-color: var(--cookie-primary-hover) !important;
      }

      /* Floating cookie icon */
      #stcm-icon {
        background-color: var(--cookie-primary) !important;
        color: var(--cookie-white) !important;
        transition: all 0.3s ease !important;
      }

      #stcm-icon:hover {
        background-color: var(--cookie-primary-hover) !important;
      }

      #stcm-icon svg path {
        fill: var(--cookie-white) !important;
      }

      /* Modal close / X button */
      .stcm-modal-close {
        /* background-color: var(--cookie-primary) !important; */
        border: none !important;
        transition: all 0.3s ease !important;
      }

      .stcm-modal-close:hover {
        background-color: var(--cookie-primary-hover) !important;
      }

      .stcm-modal-close svg path {
        fill: var(--cookie-white) !important;
      }

      /* Free banner notice */
      #stcm-wrapper a {
        color: #050505 !important;
      }
      /* Optional: modal headings/text */
      .stcm-modal h1,
      .stcm-modal h2,
      .stcm-modal p,
      .stcm-modal label {
        color: var(--cookie-text) !important;
      }

      #stcm-banner .stcm-preferences-button {
        color: var(--cookie-text) !important;
      }
      #stcm-banner .stcm-preferences-button span:hover {
        color: var(--cookie-text) !important;
      }

      .stcm-logo svg,
      .stcm-logo svg path {
        fill: var(--cookie-text) !important;
      }
    </style>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      gtag("consent", "default", {
        analytics_storage: "denied",
      });
    </script>

    <script
      src="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.0/silktide-consent-manager.js"
      integrity="sha384-j4NIMOecmtzMWe9GJADIIe5hTlHG63aiTQ/2XorW10RNyQJg+IU+xwFVDy45wBah"
      crossorigin="anonymous"
    ></script>

    <script>
      window.silktideConsentManager.init({
        backdrop: {
          show: true,
        },

        icon: {
          position: "bottomLeft",
        },

        prompt: {
          position: "bottomRight",
        },

        consentTypes: [
          {
            id: "essential",
            label: "Essential",
            description:
              "<p>These cookies are necessary for the website to function properly and cannot be switched off. They help with things like logging in and setting your privacy preferences.</p>",
            required: true,
          },
          {
            id: "analytics",
            label: "Analytics",
            description:
              "<p>These cookies help us improve the site by tracking which pages are most popular and how visitors move around the site.</p>",
            required: false,
            defaultValue: false,
            gtag: "analytics_storage",
          },
        ],

        text: {
          prompt: {
            description:
              "<p>We use cookies to improve your experience and understand how visitors use our website.</p>",
            acceptAllButtonText: "Accept all",
            acceptAllButtonAccessibleLabel: "Accept all cookies",
            rejectNonEssentialButtonText: "Reject non-essential",
            rejectNonEssentialButtonAccessibleLabel:
              "Reject all non-essential cookies",
            preferencesButtonText: "Preferences",
            preferencesButtonAccessibleLabel: "Toggle preferences",
          },

          preferences: {
            title: "Customize your cookie preferences",
            description:
              "<p>You can choose which types of cookies to allow. Essential cookies are always enabled because they are needed for the website to work properly.</p>",
            saveButtonText: "Save and close",
            saveButtonAccessibleLabel: "Save your cookie preferences",
            creditLinkText: "Get this banner for free",
            creditLinkAccessibleLabel: "Get this banner for free",
          },
        },
      });
    </script>

    <!-- Preloads -->
    <link rel="preload" as="image" href="/assets/svgs/logo-white.svg" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/assets/fonts/roboto-v29-latin-regular.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/assets/fonts/roboto-v29-latin-700.woff2"
      crossorigin
    />

    <!-- Preload an image - tag not rendered if preloadImg is blank to stop console errors -->
    {% if preloadImg != '' %}
    <link rel="preload" as="image" href="{{ preloadImg }}" />
    {% endif %}

    <!-- Sitewide Stylesheets and Scripts -->
    <link rel="stylesheet" href="/assets/css/root.css" />
    <link rel="stylesheet" href="/assets/css/dark.css" />
    <link rel="stylesheet" href="/assets/css/premium-dark.css" />
    <script defer src="/assets/js/dark.js"></script>
    <script defer src="/assets/js/nav.js"></script>

    {% block head %}{% endblock %}

    <title>{{ title }}</title>

    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-KS6MMBLZ");
    </script>
  </head>
  <body class="dark-mode">
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-KS6MMBLZ"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>

    <!--Screen reader skip main nav-->
    <a class="skip" aria-label="skip to main content" href="#main" tabindex="1"
      >Click To Skip To Main Content</a
    >

    {% include "components/header.html" %}
    <main id="main">{% block body %}{% endblock %}</main>
    {% include "components/footer.html" %}
  </body>
